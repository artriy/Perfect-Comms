[package]
name = "pc-capture"
version = "0.1.0"
edition = "2021"
description = "PerfectComms native host-side microphone capture helper (loopback TCP sidecar)."
license = "MIT"

[[bin]]
name = "pc-capture"
path = "src/main.rs"

[dependencies]
cpal = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
apm-sys = { path = "../apm-sys" }
df-sys = { path = "../df-sys" }
audiopus = "0.3.0-rc.0"
webrtc = "0.11"
tokio = { version = "1", features = ["full"] }
bytes = "1"

[target.'cfg(windows)'.build-dependencies]
winresource = "0.1"

[profile.dev.package.audiopus_sys]
opt-level = 2

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
