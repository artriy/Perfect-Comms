[package]
name = "pc-capture"
version = "0.1.0"
edition = "2021"
description = "PerfectComms native host-side microphone capture helper (loopback TCP sidecar)."
license = "MIT"

[[bin]]
name = "pc-capture"
path = "src/main.rs"

[dependencies]
cpal = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
apm-sys = { path = "../apm-sys" }
df-sys = { path = "../df-sys" }

[target.'cfg(windows)'.build-dependencies]
winresource = "0.1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
