[package]
name = "cubeb"
version = "0.36.0"
edition = "2021"
authors = ["Dan Glastonbury <dglastonbury@mozilla.com>"]
description = "Bindings to libcubeb for interacting with system audio from rust."
homepage = "https://github.com/mozilla/cubeb-rs"
repository = "https://github.com/mozilla/cubeb-rs"
license = "ISC"
readme = "README.md"
keywords = ["cubeb"]
categories = ["api-bindings"]

[features]
gecko-in-tree = ["cubeb-core/gecko-in-tree"]
no-private-apis-in-coreaudio = ["cubeb-core/no-private-apis-in-coreaudio"]

[dependencies]
cubeb-core = "=0.36.0"

[patch.crates-io]
# Direct tests of the patched wrapper must exercise the same libcubeb binding/build patch used by
# pc-capture, not silently fall back to the registry copy of cubeb-sys.
cubeb-sys = { path = "../cubeb-sys" }
