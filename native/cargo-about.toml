accepted = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "LGPL-2.1-only",
    "Zlib",
]

# Generate one conservative union for every native target shipped by Perfect Comms.
# cargo-about evaluates these together and therefore includes target-specific crates
# from all six release builds in the single notice document.
targets = [
    "x86_64-pc-windows-msvc",
    "i686-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "aarch64-linux-android",
]

ignore-build-dependencies = false
ignore-dev-dependencies = true
ignore-transitive-dependencies = false

# cubeb-sys contains several nested ISC license files for the native and Rust
# backends. Pin the package-level wrapper license so filesystem traversal order
# cannot select a different copyright notice on another operating system.
[cubeb-sys.clarify]
license = "ISC"

[[cubeb-sys.clarify.files]]
path = "LICENSE"
license = "ISC"
checksum = "8c044baa5d883274736eeece0b955249076c2697b826e576fce59496235b2cf5"
