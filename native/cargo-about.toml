accepted = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "LGPL-2.1-only",
    "Zlib",
]

# Generate one conservative union for every native target shipped by Perfect Comms.
# cargo-about evaluates these together and therefore includes target-specific crates
# from all six release builds in the single notice document.
targets = [
    "x86_64-pc-windows-msvc",
    "i686-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "aarch64-linux-android",
]

ignore-build-dependencies = false
ignore-dev-dependencies = true
ignore-transitive-dependencies = false

# rkyv_derive 0.8.17 packages both its root MIT license and a second,
# differently formatted MIT license under src/serde. Filesystem traversal order
# can otherwise make cargo-about select a different text on Windows and Linux.
[rkyv_derive.clarify]
license = 'MIT'

[[rkyv_derive.clarify.files]]
path = 'LICENSE'
license = 'MIT'
checksum = '635111a955495b5d8d34b8052f69656e8e45f6437f9266329077b9aad5fbe8d3'
