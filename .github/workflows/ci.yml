name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  managed:
    name: Managed build and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate release and helper scripts
        run: |
          python3 -m py_compile scripts/verify-release-assets.py
          python3 -m py_compile scripts/verify-package-layout.py
          python3 -m py_compile scripts/verify-native-license-inventory.py
          python3 -m py_compile scripts/verify-pion-license-inventory.py
          python3 scripts/verify-release-assets.py --self-test
          python3 scripts/verify-package-layout.py --self-test
          bash scripts/fetch-bepinex.sh --self-test
          python3 scripts/verify-release-assets.py --root . --configuration Android --manifest-only
          bash -n scripts/package-release.sh scripts/fetch-bepinex.sh scripts/build-helpers.sh scripts/build-mac.sh scripts/build-pion.sh scripts/ci-smoke-helper.sh
          bash scripts/package-release.sh --validate-source
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            packages.lock.json
            PerfectComms.Tests/packages.lock.json
      - name: Restore locked dependencies
        run: dotnet restore PerfectComms.Tests/PerfectComms.Tests.csproj --locked-mode --nologo
      - name: Build desktop managed code
        run: dotnet build PerfectComms.csproj -c Release --no-restore --nologo
      - name: Build Android managed code
        run: dotnet build PerfectComms.csproj -c Android --no-restore --nologo
      - name: Run managed tests
        run: dotnet test PerfectComms.Tests/PerfectComms.Tests.csproj -c Release --no-restore --nologo
      - name: Run Android managed tests
        run: dotnet test PerfectComms.Tests/PerfectComms.Tests.csproj -c Android --no-restore --nologo

  native-quality:
    name: Native format, lint, and tests
    runs-on: ubuntu-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: "1.26.2"
          cache-dependency-path: native/pc-pion/go.sum
      - name: Native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config cmake nasm
      - name: Rust formatting
        run: |
          cargo fmt --manifest-path native/pc-capture/Cargo.toml --all -- --check
          cargo fmt --manifest-path native/pc-mobile/Cargo.toml --all -- --check
          cargo fmt --manifest-path native/apm-sys/Cargo.toml --all -- --check
          cargo fmt --manifest-path native/pion-sys/Cargo.toml --all -- --check
      - name: Pion formatting, vet, tests, and license inventory
        run: |
          unformatted="$(find native/pc-pion -type f -name '*.go' -exec gofmt -l {} +)"
          test -z "$unformatted" || { printf '%s\n' "$unformatted"; exit 1; }
          (cd native/pc-pion && go vet -mod=readonly ./...)
          (cd native/pc-pion && go test -buildvcs=false -mod=readonly ./...)
          python3 scripts/verify-pion-license-inventory.py
          bash scripts/build-pion.sh linux-x64
      - name: Lint desktop shared core
        run: cargo clippy --manifest-path native/pc-capture/Cargo.toml --all-targets -- -D warnings
      - name: Lint mobile wrapper
        run: cargo clippy --manifest-path native/pc-mobile/Cargo.toml --all-targets -- -D warnings
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-audit@0.22.2
      - name: Audit native dependency locks
        run: |
          cargo audit --file native/pc-capture/Cargo.lock
          cargo audit --no-fetch --file native/pc-mobile/Cargo.lock
          cargo audit --no-fetch --file native/apm-sys/Cargo.lock
          cargo audit --no-fetch --file native/pion-sys/Cargo.lock
      - name: Test desktop shared core
        env:
          PC_PION_LIB: ${{ github.workspace }}/artifacts/pion/libpc-pion.so
          PC_REQUIRE_PION: "1"
          PC_PION_TEST_DISABLE_MDNS: "1"
        run: |
          cargo test --locked --manifest-path native/pion-sys/Cargo.toml --all-targets
          cargo test --manifest-path native/pc-capture/Cargo.toml --all-targets
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-about@0.9.1
      - name: Verify native dependency license inventory
        run: |
          python3 scripts/verify-native-license-inventory.py --self-test
          cargo fetch --locked --manifest-path native/pc-mobile/Cargo.toml
          cargo about generate \
            --manifest-path native/pc-mobile/Cargo.toml \
            --config native/cargo-about.toml \
            native/cargo-about.hbs \
            --frozen --fail \
            --output-file "$RUNNER_TEMP/native-rust-dependencies.html"
          python3 scripts/verify-native-license-inventory.py \
            Libs/native-rust-dependencies.html \
            "$RUNNER_TEMP/native-rust-dependencies.html"

  worker:
    name: Cloudflare worker tests and dry run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/perfect-comms-lobbies
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare/perfect-comms-lobbies/package-lock.json
      - name: Install locked Worker dependencies
        run: npm ci
      - name: Audit Worker dependencies
        run: npm audit --audit-level=high
      - name: Test Worker request handling
        run: npm test
      - name: Validate Worker deployment bundle
        run: npm run deploy:dry-run
