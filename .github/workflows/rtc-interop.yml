name: RTC shared-core gate

# Desktop and Android now use the same webrtc-rs RtcEngine. This gate exercises
# the production offer/answer/ICE/Opus path directly instead of the retired
# desktop-webrtc-rs-to-Android-SIPSorcery bridge.
on:
  push:
    branches: [main, feat/crossplatform-capture-sidecar]
    paths:
      - "native/pc-capture/**"
      - "native/pc-mobile/**"
      - "scripts/live-turn-smoke.py"
      - ".github/workflows/rtc-interop.yml"
  pull_request:
    paths:
      - "native/pc-capture/**"
      - "native/pc-mobile/**"
      - "scripts/live-turn-smoke.py"
      - ".github/workflows/rtc-interop.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  shared-core-loopback:
    name: WebRTC/Opus loopback (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ilammy/setup-nasm@v1
        if: runner.os == 'Windows'
      - name: Linux audio build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config cmake nasm
      - name: Offer/answer/ICE and Opus RTP loopback
        run: cargo test --manifest-path native/pc-capture/Cargo.toml loopback_two_engines_exchange_opus -- --nocapture
      - name: Build helper for live TURN gate
        if: runner.os == 'Linux'
        run: cargo build --release --manifest-path native/pc-capture/Cargo.toml
      - name: Two-helper Cloudflare TURN relay and voice gate
        if: runner.os == 'Linux'
        run: python3 scripts/live-turn-smoke.py native/pc-capture/target/release/pc-capture --timeout 45

  mobile-shared-core:
    name: Mobile wrapper uses the shared RTC core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Lint host build of pc-mobile
        run: cargo clippy --manifest-path native/pc-mobile/Cargo.toml --all-targets -- -D warnings
