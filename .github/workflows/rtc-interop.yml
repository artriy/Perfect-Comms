name: Pion RTC shared-core gate

# Desktop and Android use the same Rust media core and Pion v4.2.17 transport.
# This gate exercises the production Go C ABI, offer/answer/ICE, and Opus path.
on:
  push:
    branches: [main]
    paths:
      - "native/pc-capture/**"
      - "native/pc-mobile/**"
      - "native/pc-pion/**"
      - "native/pion-sys/**"
      - "scripts/build-pion.sh"
      - "scripts/live-turn-smoke.py"
      - ".github/workflows/rtc-interop.yml"
  pull_request:
    paths:
      - "native/pc-capture/**"
      - "native/pc-mobile/**"
      - "native/pc-pion/**"
      - "native/pion-sys/**"
      - "scripts/build-pion.sh"
      - "scripts/live-turn-smoke.py"
      - ".github/workflows/rtc-interop.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  shared-core-loopback:
    name: Pion WebRTC/Opus loopback (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: "1.26.2"
          cache-dependency-path: native/pc-pion/go.sum
      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2
        if: runner.os == 'Windows'
      - name: Linux audio build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config cmake nasm
      - name: Windows cgo compiler
        if: runner.os == 'Windows'
        run: choco install mingw -y --no-progress
      - name: Build and require Pion transport
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            CC=gcc bash scripts/build-pion.sh win-x64 --stage
            echo "PC_PION_LIB=$(cygpath -w "$PWD/Libs/pion/pc-pion.x64.dll")" >> "$GITHUB_ENV"
          else
            bash scripts/build-pion.sh linux-x64 --stage
            echo "PC_PION_LIB=$PWD/Libs/pion/libpc-pion.linux-x64.so" >> "$GITHUB_ENV"
          fi
          echo "PC_REQUIRE_PION=1" >> "$GITHUB_ENV"
      - name: Offer/answer/ICE and Opus RTP loopback
        env:
          PC_PION_TEST_DISABLE_MDNS: "1"
        run: cargo test --manifest-path native/pc-capture/Cargo.toml loopback_two_engines_exchange_opus -- --nocapture
      - name: Build helper for live TURN gate
        if: runner.os == 'Linux'
        run: |
          cargo build --release --manifest-path native/pc-capture/Cargo.toml
          cp Libs/pion/libpc-pion.linux-x64.so native/pc-capture/target/release/libpc-pion.so
      - name: Two-helper Cloudflare TURN relay and voice gate
        if: runner.os == 'Linux'
        run: python3 scripts/live-turn-smoke.py native/pc-capture/target/release/pc-capture --timeout 45

  mobile-shared-core:
    name: Mobile wrapper uses the shared RTC core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
      - name: Linux audio build dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config cmake nasm
      - name: Lint host build of pc-mobile
        run: cargo clippy --manifest-path native/pc-mobile/Cargo.toml --all-targets -- -D warnings
