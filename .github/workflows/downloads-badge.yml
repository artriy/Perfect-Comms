name: Update badges

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6h
  release:
    types: [published, edited, deleted]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Compute values
        id: vals
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          total=$(gh api --paginate repos/${{ github.repository }}/releases \
            --jq '[.[].assets[].download_count] | add // 0')
          tag=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name // empty')
          [ -n "$tag" ] || tag="none"
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"

      - name: Downloads badge
        uses: schneegans/dynamic-badges-action@28b0fa8bdeb46170ac397105ece0c1fe58f68910 # v1.9.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: b09ac2c39551270e9961b92e622b0893
          filename: downloads.json
          label: Downloads
          message: ${{ steps.vals.outputs.total }}
          color: 24C8DB

      - name: Latest badge
        uses: schneegans/dynamic-badges-action@28b0fa8bdeb46170ac397105ece0c1fe58f68910 # v1.9.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: b09ac2c39551270e9961b92e622b0893
          filename: latest.json
          label: Latest
          message: ${{ steps.vals.outputs.tag }}
          color: C51111
