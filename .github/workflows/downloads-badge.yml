name: Update badges

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6h
  release:
    types: [published, edited, deleted]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute total downloads
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          total=$(gh api --paginate repos/${{ github.repository }}/releases \
            --jq '[.[].assets[].download_count] | add // 0')
          mkdir -p .github/badges
          printf '{"schemaVersion":1,"label":"Downloads","message":"%s","color":"24C8DB"}\n' "$total" \
            > .github/badges/downloads.json
          echo "total=$total" >> "$GITHUB_OUTPUT"

      - name: Compute latest release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name // empty')
          [ -n "$tag" ] || tag="none"
          mkdir -p .github/badges
          printf '{"schemaVersion":1,"label":"Latest","message":"%s","color":"C51111"}\n' "$tag" \
            > .github/badges/latest.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/downloads.json .github/badges/latest.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update badges"
            git push
          fi
