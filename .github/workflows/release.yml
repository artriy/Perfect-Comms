name: Release

# The macOS helper ships ad-hoc codesigned (free, no Apple Developer account).
# The mod clears the Gatekeeper quarantine and sets the exec bit on the
# extracted .app at launch, so no Developer ID signing or notarization secrets
# are required.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/ci.yml

  helpers:
    uses: ./.github/workflows/native-helpers.yml

  rtc:
    uses: ./.github/workflows/rtc-interop.yml

  package:
    needs: [quality, helpers, rtc]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify release tag matches source version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(sed -n 's:.*<Version>\([^<]*\)</Version>.*:\1:p' PerfectComms.csproj | head -n1)"
          assembly_version="$(sed -n 's:.*<AssemblyVersion>\([^<]*\)</AssemblyVersion>.*:\1:p' PerfectComms.csproj | head -n1)"
          file_version="$(sed -n 's:.*<FileVersion>\([^<]*\)</FileVersion>.*:\1:p' PerfectComms.csproj | head -n1)"
          informational_version="$(sed -n 's:.*<InformationalVersion>\([^<]*\)</InformationalVersion>.*:\1:p' PerfectComms.csproj | head -n1)"
          plugin_version="$(sed -n 's/.*public const string Version = "\([^"]*\)";.*/\1/p' VoiceChatPluginMain.cs | head -n1)"
          tag_version="${GITHUB_REF_NAME#v}"
          expected_four_part="$project_version.0"
          if [[ ! "$project_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || \
             [[ "$plugin_version" != "$project_version" ]] || \
             [[ "$informational_version" != "$project_version" ]] || \
             [[ "$assembly_version" != "$expected_four_part" ]] || \
             [[ "$file_version" != "$expected_four_part" ]] || \
             [[ "$tag_version" != "$project_version" ]]; then
            echo "release version mismatch: tag=$tag_version project=$project_version plugin=$plugin_version assembly=$assembly_version file=$file_version informational=$informational_version" >&2
            exit 1
          fi
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main || {
            echo "release tag $GITHUB_REF_NAME does not point to a commit on main" >&2
            exit 1
          }
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Collect helpers
        uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Stage helpers into Libs
        run: |
          mkdir -p Libs/pc-capture
          cp dl/helper-win-x64/pc-capture-win-x64.exe Libs/pc-capture/
          cp dl/helper-win-x86/pc-capture-win-x86.exe Libs/pc-capture/
          cp dl/helper-linux-x64/pc-capture-linux-x64 Libs/pc-capture/
          cp dl/helper-mac/pc-capture-mac.zip Libs/pc-capture/
      - name: Stage DSP libs into Libs
        run: |
          mkdir -p Libs/dsp
          cp dl/apm-win-x64/webrtc-apm.x64.dll Libs/dsp/
          cp dl/apm-win-x86/webrtc-apm.x86.dll Libs/dsp/
          cp dl/apm-linux-x64/libwebrtc-apm.so Libs/dsp/
          cp dl/apm-mac/libwebrtc-apm.dylib Libs/dsp/
      - name: Stage Android voice engine into Libs
        run: |
          mkdir -p Libs/pc-mobile
          cp dl/helper-android-arm64/libpc_mobile.so Libs/pc-mobile/
          # Android intentionally uses the platform audio path without desktop DSP sidecars.
      - name: Assemble BepInEx sources (Steam/itch.io x86 + Epic Games Store/Microsoft Store x64)
        run: |
          bash scripts/fetch-bepinex.sh --self-test
          bash scripts/fetch-bepinex.sh win-x86 "${{ runner.temp }}/bepinex-deps-win-x86"
          bash scripts/fetch-bepinex.sh win-x64 "${{ runner.temp }}/bepinex-deps-win-x64"
      - name: Package (Release + Steam/itch.io x86 + Epic Games Store/Microsoft Store x64 dependencies)
        env:
          PC_DEPENDENCY_SOURCE_WIN_X86: ${{ runner.temp }}/bepinex-deps-win-x86
          PC_DEPENDENCY_SOURCE_WIN_X64: ${{ runner.temp }}/bepinex-deps-win-x64
        run: bash scripts/package-release.sh Release
      - name: Package (Android)
        run: bash scripts/package-release.sh Android
      - name: Upload Steam/itch.io x86 dependency artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerfectComms+dependencies-win-x86-steam-itch.zip
          path: artifacts/PerfectComms+dependencies-win-x86-steam-itch.zip
          if-no-files-found: error
          retention-days: 14
          overwrite: true
      - name: Upload Epic Games Store/Microsoft Store x64 dependency artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerfectComms+dependencies-win-x64-epic-msstore.zip
          path: artifacts/PerfectComms+dependencies-win-x64-epic-msstore.zip
          if-no-files-found: error
          retention-days: 14
          overwrite: true
      - name: Upload standalone DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PerfectComms-standalone-dlls-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/PerfectComms.dll
            artifacts/PerfectCommsAndroid.dll
          if-no-files-found: error
          retention-days: 14
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref_type == 'tag'
        with:
          generate_release_notes: true
          files: |
            artifacts/PerfectComms+dependencies-win-x86-steam-itch.zip
            artifacts/PerfectComms+dependencies-win-x64-epic-msstore.zip
            artifacts/PerfectComms.dll
            artifacts/PerfectCommsAndroid.dll
