name: Release

# The macOS helper ships ad-hoc codesigned (free, no Apple Developer account).
# The mod clears the Gatekeeper quarantine and sets the exec bit on the
# extracted .app at launch, so no Developer ID signing or notarization secrets
# are required.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  helpers:
    uses: ./.github/workflows/native-helpers.yml

  package:
    needs: helpers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"
      - name: Collect helpers
        uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Stage helpers into Libs
        run: |
          mkdir -p Libs/pc-capture
          cp dl/helper-win-x64/pc-capture-win-x64.exe Libs/pc-capture/
          cp dl/helper-win-x86/pc-capture-win-x86.exe Libs/pc-capture/
          cp dl/helper-linux-x64/pc-capture-linux-x64 Libs/pc-capture/
          cp dl/helper-mac/pc-capture-mac.zip Libs/pc-capture/
      - name: Stage DSP libs into Libs
        run: |
          mkdir -p Libs/dsp
          cp dl/apm-win-x64/webrtc-apm.x64.dll Libs/dsp/
          cp dl/apm-win-x86/webrtc-apm.x86.dll Libs/dsp/
          cp dl/apm-linux-x64/libwebrtc-apm.so Libs/dsp/
          cp dl/apm-mac/libwebrtc-apm.dylib Libs/dsp/
          cp dl/df-win-x64/df.x64.dll Libs/dsp/
          cp dl/df-win-x86/df.x86.dll Libs/dsp/
          cp dl/df-linux-x64/libdf.so Libs/dsp/
          cp dl/df-mac/libdf.dylib Libs/dsp/
      - name: Assemble BepInEx dependency bundle source
        run: bash scripts/fetch-bepinex.sh "${{ runner.temp }}/bepinex-deps"
      - name: Package (Release + dependencies)
        env:
          PC_DEPENDENCY_SOURCE: ${{ runner.temp }}/bepinex-deps
        run: bash scripts/package-release.sh Release
      - name: Package (Android)
        run: bash scripts/package-release.sh Android
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/PerfectComms+dependencies.zip
            artifacts/PerfectComms.dll
            artifacts/PerfectCommsAndroid.dll
