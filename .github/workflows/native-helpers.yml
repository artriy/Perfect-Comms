name: Native helpers

on:
  push:
    branches: [main, feat/crossplatform-capture-sidecar]
  pull_request:
    paths:
      - "Comms/SidecarVoiceClient.cs"
      - "native/pc-capture/**"
      - "native/pc-mobile/**"
      - "native/apm-sys/**"
      - "native/df-sys/**"
      - "native/third_party/webrtc-audio-processing/**"
      - "native/third_party/deep-filter/**"
      - "scripts/build-apm.sh"
      - "scripts/build-df.sh"
      - "scripts/build-helpers.sh"
      - "scripts/build-mac.sh"
      - "scripts/ci-smoke-helper.sh"
      - ".github/workflows/native-helpers.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            dest: pc-capture-win-x64.exe
            artifact: helper-win-x64
          - target: i686-pc-windows-msvc
            dest: pc-capture-win-x86.exe
            artifact: helper-win-x86
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: ilammy/setup-nasm@v1
      - name: Build helper
        shell: bash
        run: bash scripts/build-helpers.sh ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: Libs/pc-capture/${{ matrix.dest }}
          if-no-files-found: error

  # pc-mobile is a cdylib over pc-capture's lib (the shared voice core for Android). The host
  # clippy job catches "one shared core" API drift fast; the android job proves the cdylib
  # actually cross-compiles for the device target (Opus/ring/webrtc all build under the NDK).
  pc-mobile:
    runs-on: windows-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: ilammy/setup-nasm@v1
      - name: clippy pc-mobile (host)
        shell: bash
        run: cargo clippy --manifest-path native/pc-mobile/Cargo.toml --all-targets -- -D warnings

  pc-mobile-android:
    runs-on: ubuntu-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      CMAKE_GENERATOR: "Ninja"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27d
      - name: ninja-build
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: cargo-ndk
        run: cargo install cargo-ndk --version 4.1.2 --locked
      - name: cross-compile pc-mobile (arm64-v8a)
        working-directory: native/pc-mobile
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a -o ./jniLibs build --release
      - uses: actions/upload-artifact@v4
        with:
          name: helper-android-arm64
          path: native/pc-mobile/jniLibs/arm64-v8a/libpc_mobile.so
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    container: rust:1-bullseye
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4
      - name: ALSA dev headers, cmake, nasm
        run: |
          apt-get update
          apt-get install -y libasound2-dev pkg-config cmake nasm
      - name: Build helper
        run: bash scripts/build-helpers.sh x86_64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: helper-linux-x64
          path: Libs/pc-capture/pc-capture-linux-x64
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Build ad-hoc universal helper
        run: bash scripts/build-mac.sh
      - uses: actions/upload-artifact@v4
        with:
          # The helper is signed again after the two DSP dylibs are staged.
          # Never ship or smoke this base bundle as the release artifact.
          name: helper-mac-base
          path: Libs/pc-capture/pc-capture-mac.zip
          if-no-files-found: error

  smoke:
    needs: [windows, linux, mac-bundle]
    strategy:
      matrix:
        include:
          - artifact: helper-win-x64
            os: windows-latest
            bin: pc-capture-win-x64.exe
          - artifact: helper-win-x86
            os: windows-latest
            bin: pc-capture-win-x86.exe
          - artifact: helper-linux-x64
            os: ubuntu-latest
            bin: pc-capture-linux-x64
          - artifact: helper-mac
            # GitHub's arm64 VM does not expose Apple AMX, while the shipped
            # DeepFilter arm64 slice correctly uses AMX on real Apple Silicon.
            # Smoke the universal app's x86_64 slice on a native Intel runner.
            os: macos-15-intel
            bin: pc-capture-mac.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dl
      - name: Smoke
        shell: bash
        run: |
          if [[ "${{ matrix.bin }}" == *.zip ]]; then
            cd dl && unzip -o "${{ matrix.bin }}" && cd ..
            chmod +x dl/PerfectCommsAudio.app/Contents/MacOS/PerfectCommsAudio
            bash scripts/ci-smoke-helper.sh dl/PerfectCommsAudio.app/Contents/MacOS/PerfectCommsAudio
          else
            chmod +x "dl/${{ matrix.bin }}" || true
            bash scripts/ci-smoke-helper.sh "dl/${{ matrix.bin }}"
          fi

  # ---- webrtc-audio-processing DSP shared library (apm-sys gate) ----
  # Build the vendored C++ APM as a SHARED lib that exports the webrtc_apm_* C
  # ABI, then prove apm-sys (libloading) can load it and process a frame.
  # The two Windows DLLs are cross-built on Linux with the mingw toolchains the
  # crossfiles reference (same approach as Libs/df-build.md), then loaded on a
  # real Windows runner. i686 (32-bit Windows) is the go/no-go gate.
  apm-build-linux:
    runs-on: ubuntu-latest
    container: rust:1-bullseye
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Toolchains (meson, ninja, mingw cross)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config ninja-build python3 python3-pip \
            gcc-mingw-w64-i686 g++-mingw-w64-i686 \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
          # webrtc/abseil need std::thread -> force the POSIX mingw runtime
          update-alternatives --set i686-w64-mingw32-gcc /usr/bin/i686-w64-mingw32-gcc-posix || true
          update-alternatives --set i686-w64-mingw32-g++ /usr/bin/i686-w64-mingw32-g++-posix || true
          update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix || true
          update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix || true
          pip3 install meson || pip3 install --break-system-packages meson
      - name: Build linux-x64 (.so)
        run: bash scripts/build-apm.sh linux-x64
      - name: Smoke linux-x64 (apm-sys load + process a frame)
        run: |
          APM_LIB="$PWD/artifacts/apm/libwebrtc-apm.so" \
            cargo test --manifest-path native/apm-sys/Cargo.toml --release \
            -- --ignored loads_and_processes_a_frame
      - name: Build win-x64 (.dll, x86_64-w64-mingw32)
        run: bash scripts/build-apm.sh win-x64
      - name: Build win-x86 (.dll, i686-w64-mingw32) [GATE]
        run: bash scripts/build-apm.sh win-x86
      - uses: actions/upload-artifact@v4
        with:
          name: apm-linux-x64
          path: artifacts/apm/libwebrtc-apm.so
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: apm-win-x64
          path: artifacts/apm/webrtc-apm.x64.dll
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: apm-win-x86
          path: artifacts/apm/webrtc-apm.x86.dll
          if-no-files-found: error

  apm-smoke-win-x64:
    needs: apm-build-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: apm-win-x64
          path: dl
      - name: Smoke win-x64 (apm-sys load + process a frame)
        shell: bash
        run: |
          APM_LIB="$(cd dl && pwd -W)/webrtc-apm.x64.dll" \
            cargo test --manifest-path native/apm-sys/Cargo.toml --release \
            -- --ignored loads_and_processes_a_frame

  apm-smoke-win-x86:
    needs: apm-build-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc
      - uses: actions/download-artifact@v4
        with:
          name: apm-win-x86
          path: dl
      - name: Smoke win-x86 (32-bit process loads 32-bit DLL) [GATE]
        shell: bash
        run: |
          APM_LIB="$(cd dl && pwd -W)/webrtc-apm.x86.dll" \
            cargo test --manifest-path native/apm-sys/Cargo.toml --release \
            --target i686-pc-windows-msvc \
            -- --ignored loads_and_processes_a_frame

  apm-mac:
    name: apm-mac-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x86_64
            target: mac-x64
            artifact: apm-mac-x64
            file: libwebrtc-apm.x64.dylib
          - os: macos-latest
            arch: arm64
            target: mac-arm64
            artifact: apm-mac-arm64
            file: libwebrtc-apm.arm64.dylib
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: meson + ninja
        run: brew install meson ninja
      - name: Build native macOS slice
        run: bash scripts/build-apm.sh ${{ matrix.target }}
      - name: Smoke native macOS slice (apm-sys load + process a frame)
        run: |
          APM_LIB="$PWD/artifacts/apm/${{ matrix.file }}" \
            cargo test --manifest-path native/apm-sys/Cargo.toml --release \
            -- --ignored loads_and_processes_a_frame
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/apm/${{ matrix.file }}
          if-no-files-found: error

  apm-mac-universal:
    needs: apm-mac
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apm-mac-x64
          path: dl/x64
      - uses: actions/download-artifact@v4
        with:
          name: apm-mac-arm64
          path: dl/arm64
      - name: Combine and verify universal macOS APM
        run: |
          set -euo pipefail
          mkdir -p artifacts/apm
          lipo -create -output artifacts/apm/libwebrtc-apm.dylib \
            dl/x64/libwebrtc-apm.x64.dylib \
            dl/arm64/libwebrtc-apm.arm64.dylib
          lipo artifacts/apm/libwebrtc-apm.dylib -verify_arch x86_64 arm64
          lipo -info artifacts/apm/libwebrtc-apm.dylib
      - uses: actions/upload-artifact@v4
        with:
          name: apm-mac
          path: artifacts/apm/libwebrtc-apm.dylib
          if-no-files-found: error

  # ---- DeepFilterNet libDF DSP shared library (df-sys gate) ----
  # Build the vendored DeepFilterNet libDF crate as a SHARED cdylib that exports
  # the df_* C ABI, then prove df-sys (libloading) can load it and process a
  # frame. libDF/tract is pure Rust, so the two Windows DLLs are cross-built on
  # Linux with the mingw GNU targets + crt-static (per Libs/df-build.md), then
  # loaded on a real Windows runner. i686 (32-bit Windows) is the go/no-go gate.
  df-build-linux:
    runs-on: ubuntu-latest
    container: rust:1-bullseye
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Toolchains (mingw cross, perl)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential perl \
            gcc-mingw-w64-i686 g++-mingw-w64-i686 \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
          update-alternatives --set i686-w64-mingw32-gcc /usr/bin/i686-w64-mingw32-gcc-posix || true
          update-alternatives --set i686-w64-mingw32-g++ /usr/bin/i686-w64-mingw32-g++-posix || true
          update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix || true
          update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix || true
          rustup target add x86_64-pc-windows-gnu i686-pc-windows-gnu
      - name: Build linux-x64 (.so)
        run: bash scripts/build-df.sh linux-x64
      - name: Smoke linux-x64 (df-sys load + process a frame)
        run: |
          DF_LIB="$PWD/artifacts/df/libdf.so" \
            cargo test --manifest-path native/df-sys/Cargo.toml --release \
            -- --ignored loads_and_processes_a_frame
      - name: Build win-x64 (.dll, x86_64-pc-windows-gnu)
        run: bash scripts/build-df.sh win-x64
      - name: Build win-x86 (.dll, i686-pc-windows-gnu) [GATE]
        run: bash scripts/build-df.sh win-x86
      - uses: actions/upload-artifact@v4
        with:
          name: df-linux-x64
          path: artifacts/df/libdf.so
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: df-win-x64
          path: artifacts/df/df.x64.dll
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: df-win-x86
          path: artifacts/df/df.x86.dll
          if-no-files-found: error

  df-smoke-win-x64:
    needs: df-build-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: df-win-x64
          path: dl
      - name: Smoke win-x64 (df-sys load + process a frame)
        shell: bash
        run: |
          DF_LIB="$(cd dl && pwd -W)/df.x64.dll" \
            cargo test --manifest-path native/df-sys/Cargo.toml --release \
            -- --ignored loads_and_processes_a_frame

  df-smoke-win-x86:
    needs: df-build-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc
      - uses: actions/download-artifact@v4
        with:
          name: df-win-x86
          path: dl
      - name: Smoke win-x86 (32-bit process loads 32-bit DLL) [GATE]
        shell: bash
        run: |
          DF_LIB="$(cd dl && pwd -W)/df.x86.dll" \
            cargo test --manifest-path native/df-sys/Cargo.toml --release \
            --target i686-pc-windows-msvc \
            -- --ignored loads_and_processes_a_frame

  df-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Build universal mac (.dylib)
        run: bash scripts/build-df.sh mac
      - name: Verify exported C ABI (df_*)
        run: |
          set -euo pipefail
          dylib="$PWD/artifacts/df/libdf.dylib"
          lipo -info "$dylib"
          syms="$(nm -g "$dylib")"
          for s in df_create df_get_frame_length df_process_frame df_free; do
            echo "$syms" | grep -Eq "[0-9a-f]+ T _$s$" || { echo "MISSING export: $s" >&2; exit 1; }
          done
          echo "df_* C ABI exported on both slices"
      - name: Smoke mac (df-sys load + process a frame, x86_64 slice via Rosetta)
        run: |
          set -euo pipefail
          # tract picks Apple's AMX matmul kernel on arm64 macOS (has_amx() is
          # hardcoded true there); the virtualized macOS CI runners do not expose
          # AMX, so the arm64 slice SIGILLs in CI. Real Apple Silicon Macs have
          # AMX and run it fine. We therefore prove load + process on the
          # universal dylib's x86_64 slice under Rosetta 2 (x86_64 never uses
          # AMX); the arm64 slice still ships for native arm64 hosts.
          sudo softwareupdate --install-rosetta --agree-to-license || true
          DF_LIB="$PWD/artifacts/df/libdf.dylib" \
            cargo test --manifest-path native/df-sys/Cargo.toml --release \
            --target x86_64-apple-darwin -- --ignored loads_and_processes_a_frame
      - uses: actions/upload-artifact@v4
        with:
          name: df-mac
          path: artifacts/df/libdf.dylib
          if-no-files-found: error

  # Assemble exactly what SidecarLauncher extracts at runtime, then apply the
  # final ad-hoc signature. Copying dylibs into an already-signed .app changes
  # the signed bundle and can make macOS reject libloading.
  mac-bundle:
    needs: [macos, apm-mac-universal, df-mac]
    # Sign and smoke the universal bundle on Intel. GitHub's arm64 virtual
    # runner lacks AMX and would SIGILL in DeepFilter despite valid binaries.
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: helper-mac-base
          path: dl/helper
      - uses: actions/download-artifact@v4
        with:
          name: apm-mac
          path: dl/apm
      - uses: actions/download-artifact@v4
        with:
          name: df-mac
          path: dl/df
      - name: Stage DSP, sign, verify, and smoke final app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bundle Libs/pc-capture
          ditto -x -k dl/helper/pc-capture-mac.zip bundle
          app="$PWD/bundle/PerfectCommsAudio.app"
          test -x "$app/Contents/MacOS/PerfectCommsAudio"
          cp dl/apm/libwebrtc-apm.dylib "$app/Contents/MacOS/"
          cp dl/df/libdf.dylib "$app/Contents/MacOS/"
          chmod 755 "$app/Contents/MacOS/"*.dylib
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          bash scripts/ci-smoke-helper.sh \
            "$app/Contents/MacOS/PerfectCommsAudio" --require-dsp
          ditto -c -k --keepParent "$app" Libs/pc-capture/pc-capture-mac.zip
      - uses: actions/upload-artifact@v4
        with:
          name: helper-mac
          path: Libs/pc-capture/pc-capture-mac.zip
          if-no-files-found: error

  # ---- helper-to-helper webrtc loopback (Phase 3 RtcEngine gate) ----
  # Two in-process RtcEngines cross-feed offer/answer/ICE over their LocalSignal
  # channels, then one sends an Opus packet and the other's recv() must yield it.
  # This proves the helper's webrtc-rs peer table end to end without the mod.
  helper-rtc-loopback-linux:
    runs-on: ubuntu-latest
    container: rust:1-bullseye
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4
      - name: ALSA dev headers, cmake, nasm
        run: |
          apt-get update
          apt-get install -y libasound2-dev pkg-config cmake nasm
      - name: webrtc helper-to-helper loopback (offer/answer/candidates + opus)
        run: cargo test --manifest-path native/pc-capture/Cargo.toml loopback_two_engines_exchange_opus -- --nocapture

  helper-rtc-loopback-win:
    runs-on: windows-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ilammy/setup-nasm@v1
      - name: webrtc helper-to-helper loopback (offer/answer/candidates + opus)
        run: cargo test --manifest-path native/pc-capture/Cargo.toml loopback_two_engines_exchange_opus -- --nocapture
