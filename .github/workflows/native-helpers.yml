name: Native helpers

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "Comms/SidecarLauncher.cs"
      - "Comms/SidecarVoiceClient.cs"
      - "Comms/WineEnvironment.cs"
      - "PerfectComms.csproj"
      - "native/cmake/**"
      - "native/pc-capture/**"
      - "native/pc-mobile/**"
      - "native/pc-pion/**"
      - "native/pion-sys/**"
      - "native/apm-sys/**"
      - "native/third_party/webrtc-audio-processing/**"
      - "scripts/build-apm.sh"
      - "scripts/build-helpers.sh"
      - "scripts/build-mac.sh"
      - "scripts/build-pion.sh"
      - "scripts/ci-smoke-helper.sh"
      - "scripts/package-release.ps1"
      - "scripts/package-release.sh"
      - "scripts/verify-release-assets.py"
      - "scripts/verify-pion-license-inventory.py"
      - "Libs/pion-go-dependencies.txt"
      - ".github/workflows/native-helpers.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  pion-windows:
    name: Pion v4.2.17 (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win-x64
            package: gcc-mingw-w64-x86-64
            cc: x86_64-w64-mingw32-gcc
            artifact: pion-win-x64
            file: pc-pion.x64.dll
          - target: win-x86
            package: gcc-mingw-w64-i686
            cc: i686-w64-mingw32-gcc
            artifact: pion-win-x86
            file: pc-pion.x86.dll
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.2"
          cache-dependency-path: native/pc-pion/go.sum
      - name: MinGW cgo compiler
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.package }}
      - name: Build Pion c-shared library
        env:
          CC: ${{ matrix.cc }}
        run: bash scripts/build-pion.sh ${{ matrix.target }}
      - name: Verify architecture and self-contained compiler runtime
        run: python3 scripts/verify-release-assets.py --pe-no-private-runtime artifacts/pion/${{ matrix.file }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/pion/${{ matrix.file }}
          if-no-files-found: error

  pion-linux:
    name: Pion v4.2.17 (linux-x64, glibc 2.31)
    runs-on: ubuntu-latest
    container: debian:bullseye-slim
    steps:
      - name: Bullseye build prerequisites
        run: |
          apt-get update
          apt-get install -y build-essential ca-certificates git python3
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.2"
          cache-dependency-path: native/pc-pion/go.sum
      - name: Test locked Pion module and license inventory
        run: |
          (cd native/pc-pion && go test -buildvcs=false -mod=readonly ./...)
          python3 scripts/verify-pion-license-inventory.py
      - name: Build Pion c-shared library
        run: bash scripts/build-pion.sh linux-x64
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pion-linux-x64
          path: artifacts/pion/libpc-pion.so
          if-no-files-found: error

  windows:
    name: windows (${{ matrix.target }}, ${{ matrix.dest }}, ${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            dest: pc-capture-win-x64.exe
            artifact: helper-win-x64
            runner: windows-latest
          - target: i686-pc-windows-msvc
            dest: pc-capture-win-x86.exe
            artifact: helper-win-x86
            # VS 2026's MSVC 14.51 crashes internally while compiling Opus 1.6.1
            # DRED SIMD for Win32. Keep the supported VS 2022 compiler for this
            # target so DRED and SIMD remain enabled.
            runner: windows-2022
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2
      - name: Build helper
        shell: bash
        run: bash scripts/build-helpers.sh ${{ matrix.target }}
      - name: Verify helper has no private MSVC runtime dependency
        run: python scripts/verify-release-assets.py --pe-no-private-runtime Libs/pc-capture/${{ matrix.dest }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: Libs/pc-capture/${{ matrix.dest }}
          if-no-files-found: error

  # pc-mobile is a cdylib over pc-capture's lib (the shared voice core for Android). The host
  # clippy job catches "one shared core" API drift fast; the android job proves the cdylib
  # actually cross-compiles for the device target (Opus and the Pion facade build under the NDK).
  pc-mobile:
    runs-on: windows-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2
      - name: clippy pc-mobile (host)
        shell: bash
        run: cargo clippy --manifest-path native/pc-mobile/Cargo.toml --all-targets -- -D warnings

  pc-mobile-android:
    runs-on: ubuntu-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      CMAKE_GENERATOR: "Ninja"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-linux-android
      - uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        id: ndk
        with:
          ndk-version: r27d
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.2"
          cache-dependency-path: native/pc-pion/go.sum
      - name: ninja-build
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: cargo-ndk
        run: cargo install cargo-ndk --version 4.1.2 --locked
      - name: Build Pion transport (Android ARM64)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: bash scripts/build-pion.sh android-arm64
      - name: cross-compile pc-mobile (arm64-v8a)
        working-directory: native/pc-mobile
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a -o ./jniLibs build --release
      - name: Verify pc-mobile release ABI
        run: |
          mkdir -p Libs/pc-mobile
          mkdir -p Libs/pion
          cp native/pc-mobile/jniLibs/arm64-v8a/libpc_mobile.so Libs/pc-mobile/
          cp artifacts/pion/android-arm64/libpc-pion.so Libs/pion/libpc-pion.android-arm64.so
          python3 scripts/verify-release-assets.py --root . --configuration Android
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helper-android-arm64
          path: native/pc-mobile/jniLibs/arm64-v8a/libpc_mobile.so
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pion-android-arm64
          path: artifacts/pion/android-arm64/libpc-pion.so
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    container: rust:1-bullseye
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: ALSA dev headers, cmake, nasm
        run: |
          apt-get update
          apt-get install -y libasound2-dev pkg-config cmake nasm
      - name: Build helper
        run: bash scripts/build-helpers.sh x86_64-unknown-linux-gnu
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helper-linux-x64
          path: Libs/pc-capture/pc-capture-linux-x64
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.2"
          cache-dependency-path: native/pc-pion/go.sum
      - name: Build ad-hoc universal helper
        run: bash scripts/build-mac.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # The helper is signed again after the APM dylib is staged.
          # Never ship or smoke this base bundle as the release artifact.
          name: helper-mac-base
          path: Libs/pc-capture/pc-capture-mac.zip
          if-no-files-found: error

  smoke:
    needs: [windows, linux, mac-bundle, apm-build-linux, pion-windows, pion-linux]
    strategy:
      matrix:
        include:
          - artifact: helper-win-x64
            os: windows-latest
            bin: pc-capture-win-x64.exe
            apm_artifact: apm-win-x64
            pion_artifact: pion-win-x64
            pion_file: pc-pion.x64.dll
          - artifact: helper-win-x86
            os: windows-latest
            bin: pc-capture-win-x86.exe
            apm_artifact: apm-win-x86
            pion_artifact: pion-win-x86
            pion_file: pc-pion.x86.dll
          - artifact: helper-linux-x64
            os: ubuntu-latest
            bin: pc-capture-linux-x64
            apm_artifact: apm-linux-x64
            pion_artifact: pion-linux-x64
            pion_file: libpc-pion.so
          - artifact: helper-mac
            # Smoke both slices of the final signed universal app on native runners.
            os: macos-15-intel
            bin: pc-capture-mac.zip
            apm_artifact: ""
            pion_artifact: ""
            pion_file: ""
          - artifact: helper-mac
            os: macos-latest
            bin: pc-capture-mac.zip
            apm_artifact: ""
            pion_artifact: ""
            pion_file: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dl
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: matrix.apm_artifact != ''
        with:
          name: ${{ matrix.apm_artifact }}
          path: dl
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: matrix.pion_artifact != ''
        with:
          name: ${{ matrix.pion_artifact }}
          path: dl
      - name: Smoke
        shell: bash
        run: |
          if [[ -n "${{ matrix.pion_file }}" ]]; then
            pion_path="$PWD/dl/${{ matrix.pion_file }}"
            if command -v cygpath >/dev/null 2>&1; then
              pion_path="$(cygpath -w "$pion_path")"
            fi
            export PC_PION_LIB="$pion_path"
            export PC_REQUIRE_PION=1
          fi
          if [[ "${{ matrix.bin }}" == *.zip ]]; then
            cd dl && unzip -o "${{ matrix.bin }}" && cd ..
            chmod +x dl/PerfectCommsAudio.app/Contents/MacOS/PerfectCommsAudio
            codesign --verify --deep --strict --verbose=2 dl/PerfectCommsAudio.app
            bash scripts/ci-smoke-helper.sh \
              dl/PerfectCommsAudio.app/Contents/MacOS/PerfectCommsAudio --require-dsp
          else
            chmod +x "dl/${{ matrix.bin }}" || true
            bash scripts/ci-smoke-helper.sh "dl/${{ matrix.bin }}" --require-dsp
          fi

  # ---- webrtc-audio-processing DSP shared library (apm-sys gate) ----
  # Build the vendored C++ APM as a SHARED lib that exports the webrtc_apm_* C
  # ABI, then prove apm-sys (libloading) can load it and process a frame.
  # The two Windows DLLs are cross-built on Linux with the mingw toolchains the
  # crossfiles reference, then loaded on a real Windows runner. i686 (32-bit
  # Windows) is the go/no-go gate.
  apm-build-linux:
    runs-on: ubuntu-latest
    container: rust:1-bullseye
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - name: Toolchains (meson, ninja, mingw cross)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config ninja-build python3 python3-pip \
            gcc-mingw-w64-i686 g++-mingw-w64-i686 \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
          # webrtc/abseil need std::thread -> force the POSIX mingw runtime
          update-alternatives --set i686-w64-mingw32-gcc /usr/bin/i686-w64-mingw32-gcc-posix || true
          update-alternatives --set i686-w64-mingw32-g++ /usr/bin/i686-w64-mingw32-g++-posix || true
          update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix || true
          update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix || true
          pip3 install meson || pip3 install --break-system-packages meson
      - name: Build linux-x64 (.so)
        run: bash scripts/build-apm.sh linux-x64
      - name: Smoke linux-x64 (apm-sys load + process a frame)
        run: |
          APM_LIB="$PWD/artifacts/apm/libwebrtc-apm.so" \
            cargo test --manifest-path native/apm-sys/Cargo.toml --release \
            -- --ignored loads_and_processes_a_frame
      - name: Build win-x64 (.dll, x86_64-w64-mingw32)
        run: bash scripts/build-apm.sh win-x64
      - name: Build win-x86 (.dll, i686-w64-mingw32) [GATE]
        run: bash scripts/build-apm.sh win-x86
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apm-linux-x64
          path: artifacts/apm/libwebrtc-apm.so
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apm-win-x64
          path: artifacts/apm/webrtc-apm.x64.dll
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apm-win-x86
          path: artifacts/apm/webrtc-apm.x86.dll
          if-no-files-found: error

  apm-smoke-win-x64:
    needs: apm-build-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: apm-win-x64
          path: dl
      - name: Verify no unbundled compiler runtime
        run: python scripts/verify-release-assets.py --pe-no-private-runtime dl/webrtc-apm.x64.dll
      - name: Smoke win-x64 (apm-sys load + process a frame)
        shell: bash
        run: |
          APM_LIB="$(cd dl && pwd -W)/webrtc-apm.x64.dll" \
            cargo test --manifest-path native/apm-sys/Cargo.toml --release \
            -- --ignored loads_and_processes_a_frame

  apm-smoke-win-x86:
    needs: apm-build-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: i686-pc-windows-msvc
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: apm-win-x86
          path: dl
      - name: Verify no unbundled compiler runtime
        run: python scripts/verify-release-assets.py --pe-no-private-runtime dl/webrtc-apm.x86.dll
      - name: Smoke win-x86 (32-bit process loads 32-bit DLL) [GATE]
        shell: bash
        run: |
          APM_LIB="$(cd dl && pwd -W)/webrtc-apm.x86.dll" \
            cargo test --manifest-path native/apm-sys/Cargo.toml --release \
            --target i686-pc-windows-msvc \
            -- --ignored loads_and_processes_a_frame

  apm-mac:
    name: apm-mac-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x86_64
            target: mac-x64
            artifact: apm-mac-x64
            file: libwebrtc-apm.x64.dylib
          - os: macos-latest
            arch: arm64
            target: mac-arm64
            artifact: apm-mac-arm64
            file: libwebrtc-apm.arm64.dylib
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: meson + ninja
        run: brew install meson ninja
      - name: Build native macOS slice
        run: bash scripts/build-apm.sh ${{ matrix.target }}
      - name: Smoke native macOS slice (apm-sys load + process a frame)
        run: |
          APM_LIB="$PWD/artifacts/apm/${{ matrix.file }}" \
            cargo test --manifest-path native/apm-sys/Cargo.toml --release \
            -- --ignored loads_and_processes_a_frame
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/apm/${{ matrix.file }}
          if-no-files-found: error

  apm-mac-universal:
    needs: apm-mac
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: apm-mac-x64
          path: dl/x64
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: apm-mac-arm64
          path: dl/arm64
      - name: Combine and verify universal macOS APM
        run: |
          set -euo pipefail
          mkdir -p artifacts/apm
          lipo -create -output artifacts/apm/libwebrtc-apm.dylib \
            dl/x64/libwebrtc-apm.x64.dylib \
            dl/arm64/libwebrtc-apm.arm64.dylib
          lipo artifacts/apm/libwebrtc-apm.dylib -verify_arch x86_64 arm64
          lipo -info artifacts/apm/libwebrtc-apm.dylib
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apm-mac
          path: artifacts/apm/libwebrtc-apm.dylib
          if-no-files-found: error

  # Assemble exactly what SidecarLauncher extracts at runtime, then apply the
  # final ad-hoc signature. Pion is already in the base app; this stage adds APM.
  # Copying dylibs into an already-signed .app changes
  # the signed bundle and can make macOS reject libloading.
  mac-bundle:
    needs: [macos, apm-mac-universal]
    # Sign and smoke the universal bundle's x86_64 slice on Intel.
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helper-mac-base
          path: dl/helper
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: apm-mac
          path: dl/apm
      - name: Stage DSP, sign, verify, and smoke final app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bundle Libs/pc-capture
          ditto -x -k dl/helper/pc-capture-mac.zip bundle
          app="$PWD/bundle/PerfectCommsAudio.app"
          test -x "$app/Contents/MacOS/PerfectCommsAudio"
          test -s "$app/Contents/MacOS/libpc-pion.dylib"
          cp dl/apm/libwebrtc-apm.dylib "$app/Contents/MacOS/"
          chmod 755 "$app/Contents/MacOS/"*.dylib
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          bash scripts/ci-smoke-helper.sh \
            "$app/Contents/MacOS/PerfectCommsAudio" --require-dsp
          ditto -c -k --keepParent "$app" Libs/pc-capture/pc-capture-mac.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helper-mac
          path: Libs/pc-capture/pc-capture-mac.zip
          if-no-files-found: error

  # ---- helper-to-helper Pion WebRTC loopback (RtcEngine gate) ----
  # Two in-process RtcEngines cross-feed offer/answer/ICE over their LocalSignal
  # channels, then one sends an Opus packet and the other's recv() must yield it.
  # This proves the helper's Pion peer table and c-shared boundary end to end without the mod.
  helper-rtc-loopback-linux:
    needs: pion-linux
    runs-on: ubuntu-latest
    container: rust:1-bullseye
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pion-linux-x64
          path: dl
      - name: ALSA dev headers, cmake, nasm
        run: |
          apt-get update
          apt-get install -y libasound2-dev pkg-config cmake nasm
      - name: Pion helper-to-helper loopback (offer/answer/candidates + Opus)
        env:
          PC_PION_TEST_DISABLE_MDNS: "1"
        run: |
          PC_PION_LIB="$PWD/dl/libpc-pion.so" PC_REQUIRE_PION=1 \
            cargo test --manifest-path native/pc-capture/Cargo.toml loopback_two_engines_exchange_opus -- --nocapture

  helper-rtc-loopback-win:
    needs: pion-windows
    runs-on: windows-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pion-win-x64
          path: dl
      - name: Pion helper-to-helper loopback (offer/answer/candidates + Opus)
        env:
          PC_PION_TEST_DISABLE_MDNS: "1"
        shell: bash
        run: |
          PC_PION_LIB="$(cd dl && pwd -W)/pc-pion.x64.dll" PC_REQUIRE_PION=1 \
            cargo test --manifest-path native/pc-capture/Cargo.toml loopback_two_engines_exchange_opus -- --nocapture
